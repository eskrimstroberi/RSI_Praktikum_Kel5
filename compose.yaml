services:
  postgres:
    image: docker.io/postgres:16.13-alpine3.23
    restart: always
    ports:
      - "${HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    networks:
      - rsinet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    working_dir: /app
    env_file:
      - .env
    ports:
      - "${FASTAPI_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app:z
      - /backend/.venv
    networks:
      - rsinet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "backend.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

volumes:
  postgres_data:

networks:
  rsinet:
    driver: bridge
